name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Fmt, Lint, Test, Build (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Smoke test schema output
        run: cargo run --quiet -p krx-cli -- --output json schema show krx_dd_trd >/dev/null

      - name: Smoke test dry-run planning
        run: cargo run --quiet -p krx-cli -- --output json call krx_dd_trd --date 20200414 --sample --dry-run >/dev/null

      - name: Build release binary
        run: make build-release

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Fmt, Test, Build (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Test
        run: cargo test --locked

      - name: Smoke test schema output
        run: cargo run --quiet -p krx-cli -- --output json schema show krx_dd_trd >/dev/null

      - name: Smoke test dry-run planning
        run: cargo run --quiet -p krx-cli -- --output json call krx_dd_trd --date 20200414 --sample --dry-run >/dev/null

      - name: Build release binary
        run: cargo build --locked -p krx-cli --bin krx --release
